<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>りゅりゅ - ミニゲームラウンジ</title>
    <style>
        /* カスタムフォントの読み込み */
        @font-face {
            font-family: 'WRCCleanBold';
            src: url('fonts/WRCCleanBold.woff2') format('woff2'),
                 url('fonts/WRCCleanBold.ttf') format('truetype');
        }

        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --primary: #00e5ff;
            --primary-hover: #00b3cc;
            --text-main: #ffffff;
            --text-sub: #a0a0b0;
            --danger: #ff4757;
            --gold: #FFD700;
            --light-blue: #00e5ff;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* コンテナデザイン (グラスモーフィズム風) */
        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        @media (min-width: 500px) {
            .container {
                min-height: 90vh;
                border-radius: 16px;
                border: 1px solid var(--border);
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            }
        }

        h1, h2 { text-align: center; margin-bottom: 1.5rem; font-weight: 600; letter-spacing: 2px; }
        h1 { color: var(--primary); text-shadow: 0 0 10px rgba(0, 229, 255, 0.3); }
        h2 { font-size: 1.1rem; color: var(--text-sub); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 1rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            transition: border 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #007acc);
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.3s;
            margin-bottom: 1rem;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2);
        }

        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 229, 255, 0.4); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
        
        button.danger { background: linear-gradient(135deg, var(--danger), #cc0000); color: white; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.2); }
        button.secondary { background: #2f3542; color: white; box-shadow: none; }

        /* 画面の切り替え */
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ヘッダー (自分の情報) */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .my-profile { display: flex; align-items: center; font-size: 1.1rem; font-weight: bold; }
        .role-icon { margin-left: 8px; font-size: 1.2rem; }
        .icon-admin { color: var(--gold); text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
        .icon-verified { color: var(--light-blue); text-shadow: 0 0 5px rgba(0, 229, 255, 0.5); }

        #settings-btn {
            background: none; box-shadow: none; width: auto; padding: 5px; margin: 0;
            font-size: 1.5rem; color: var(--text-sub); transition: color 0.3s, transform 0.3s;
        }
        #settings-btn:hover { color: var(--text-main); transform: rotate(90deg); }

        /* プレイヤーリスト */
        .player-list { list-style: none; margin-bottom: 2rem; }
        .player-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; background: rgba(0,0,0,0.2);
            border-radius: 8px; margin-bottom: 0.5rem; border: 1px solid var(--border);
        }

        /* タイマー用フォント */
        .timer-display {
            font-family: 'WRCCleanBold', sans-serif;
            font-size: 3.5rem;
            text-align: center;
            margin: 2rem 0;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            letter-spacing: 5px;
        }

        /* モーダル (ポップアップ) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease; }
        
        .modal-content {
            background: var(--card-bg); width: 90%; max-width: 400px;
            padding: 2rem; border-radius: 16px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        #hidden-admin-btn {
            background: none; box-shadow: none; color: rgba(255,255,255,0.05); /* 非常に薄い */
            font-size: 0.8rem; padding: 5px; margin-top: 2rem; width: auto;
        }
        #hidden-admin-btn:hover { color: rgba(255,255,255,0.2); }

    </style>
</head>
<body>

<div class="container">
    
    <div id="lobby-screen" class="screen">
        <div class="top-header">
            <div class="my-profile">
                <span id="display-my-name">ゲスト</span>
                <span id="display-my-badge"></span>
            </div>
            <button id="settings-btn">⚙️</button>
        </div>

        <h1>RYURYU</h1>

        <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 1.5rem;">
            <h2>部屋に参加する</h2>
            <input type="text" id="pin-input" placeholder="5桁のPINを入力" maxlength="5">
            <button id="join-btn">接続</button>
        </div>

        <div id="pin-generation-area" style="display: none; background: rgba(0,229,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid rgba(0,229,255,0.2); margin-bottom: 1.5rem;">
            <h2>ホストメニュー</h2>
            <button id="generate-pin-btn" class="secondary" style="border: 1px solid var(--primary); color: var(--primary);">新しいPINを作成する</button>
            <p id="current-pin-display" style="text-align: center; font-weight: bold; font-size: 1.5rem; letter-spacing: 3px; color: var(--gold);"></p>
        </div>

        <h2>プレイヤー一覧</h2>
        <ul id="players-ul" class="player-list"></ul>

        <h2>ゲーム選択</h2>
        <button id="start-jinrou-btn" disabled>🐺 人狼ゲーム</button>
        <button id="start-ngword-btn" disabled>💬 NGワードゲーム</button>
    </div>

    <div id="game-screen" class="screen">
        <h1 id="game-title">ゲーム画面</h1>
        <div class="timer-display" id="game-timer">03:00</div>
        <div id="game-content" style="text-align: center; margin-bottom: 2rem;">
            ゲーム進行UIがここに表示されます
        </div>
        <button id="back-to-lobby-btn" class="danger">退出してロビーに戻る</button>
    </div>
</div>

<div id="name-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="color: var(--primary); border:none;">ようこそ！</h2>
        <p style="margin-bottom: 1rem; color: var(--text-sub); font-size: 0.9rem;">ゲームで使用する名前を教えてください。</p>
        <input type="text" id="initial-name-input" placeholder="あなたの名前">
        <button id="save-initial-name-btn">決定</button>
    </div>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="border:none;">設定</h2>
        <div style="text-align: left; margin-bottom: 1rem;">
            <label style="font-size: 0.9rem; color: var(--text-sub);">名前の変更</label>
            <input type="text" id="settings-name-input" placeholder="新しい名前">
        </div>
        <button id="save-settings-btn">保存して閉じる</button>
        <button id="close-settings-btn" class="secondary">キャンセル</button>
        
        <button id="hidden-admin-btn">私は管理者です</button>
    </div>
</div>

<script>
    // --- 状態管理 ---
    let appState = {
        user: { name: '', role: 'guest' }, // role: 'guest', 'verified', 'admin'
        currentPin: null,
        players: []
    };

    function saveState() { localStorage.setItem('ryuryu_data', JSON.stringify(appState)); }
    function loadState() {
        const saved = localStorage.getItem('ryuryu_data');
        if (saved) appState = JSON.parse(saved);
    }

    // --- UI制御 ---
    const screens = { lobby: document.getElementById('lobby-screen'), game: document.getElementById('game-screen') };
    const modals = { name: document.getElementById('name-modal'), settings: document.getElementById('settings-modal') };

    function showScreen(screenName) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[screenName].classList.add('active');
        if(screenName === 'lobby') updateLobbyUI();
    }

    function showModal(modalName) { modals[modalName].classList.add('active'); }
    function hideModal(modalName) { modals[modalName].classList.remove('active'); }

    // --- 初期化処理 ---
    window.onload = () => {
        loadState();
        if (!appState.user.name) {
            // 名前がない場合は初回ポップアップ
            showModal('name');
        } else {
            // 名前がある場合はロビーへ
            showScreen('lobby');
        }
    };

    // --- イベントリスナー (ポップアップ) ---
    // 初回名前登録
    document.getElementById('save-initial-name-btn').addEventListener('click', () => {
        const name = document.getElementById('initial-name-input').value.trim();
        if (!name) return alert('名前を入力してください');
        appState.user.name = name;
        appState.players = [{ name: appState.user.name, role: appState.user.role }]; // モック
        saveState();
        hideModal('name');
        showScreen('lobby');
    });

    // 設定ボタンを開く
    document.getElementById('settings-btn').addEventListener('click', () => {
        document.getElementById('settings-name-input').value = appState.user.name;
        showModal('settings');
    });

    // 設定キャンセル
    document.getElementById('close-settings-btn').addEventListener('click', () => hideModal('settings'));

    // 設定保存
    document.getElementById('save-settings-btn').addEventListener('click', () => {
        const newName = document.getElementById('settings-name-input').value.trim();
        if (newName) {
            appState.user.name = newName;
            // モック: 自分のリスト情報も更新
            if(appState.players.length > 0) appState.players[0].name = newName;
            saveState();
            updateLobbyUI();
        }
        hideModal('settings');
    });

    // 管理者パスワード (隠しボタン)
    document.getElementById('hidden-admin-btn').addEventListener('click', () => {
        const pass = prompt('管理者パスワードを入力してください:');
        if (pass === '999999999') {
            appState.user.role = 'admin';
            if(appState.players.length > 0) appState.players[0].role = 'admin';
            saveState();
            alert('管理者権限を取得しました。');
            updateLobbyUI();
            hideModal('settings');
        }
    });

    // --- イベントリスナー (ロビー) ---
    // 接続ボタン
    document.getElementById('join-btn').addEventListener('click', () => {
        const pin = document.getElementById('pin-input').value.trim();
        if (pin.length !== 5) return alert('5桁のPINを入力してください');
        
        // P2P接続のモック処理
        appState.currentPin = pin;
        alert(`PIN: ${pin} の部屋に接続を試みます... (P2P実装予定)`);
    });

    // PIN作成
    document.getElementById('generate-pin-btn').addEventListener('click', () => {
        const newPin = Math.floor(10000 + Math.random() * 90000).toString();
        appState.currentPin = newPin;
        document.getElementById('current-pin-display').innerText = newPin;
        saveState();
        
        // ホストとしてゲーム開始ボタンを有効化
        document.getElementById('start-jinrou-btn').disabled = false;
        document.getElementById('start-ngword-btn').disabled = false;
    });

    // ユーザー認証処理 (モック)
    function verifyUser(index) {
        if (appState.user.role === 'admin') {
            appState.players[index].role = 'verified';
            saveState();
            updateLobbyUI();
        }
    }

    // --- UI更新 ---
    function updateLobbyUI() {
        // ヘッダーの自分情報更新
        document.getElementById('display-my-name').innerText = appState.user.name;
        let badge = '';
        if (appState.user.role === 'admin') badge = '<span class="role-icon icon-admin">✔</span>';
        if (appState.user.role === 'verified') badge = '<span class="role-icon icon-verified">✔</span>';
        document.getElementById('display-my-badge').innerHTML = badge;

        // PIN作成エリアの表示制御
        const pinArea = document.getElementById('pin-generation-area');
        if (appState.user.role === 'admin' || appState.user.role === 'verified') {
            pinArea.style.display = 'block';
            if (appState.currentPin) {
                document.getElementById('current-pin-display').innerText = appState.currentPin;
                document.getElementById('start-jinrou-btn').disabled = false;
                document.getElementById('start-ngword-btn').disabled = false;
            }
        } else {
            pinArea.style.display = 'none';
        }

        // プレイヤーリスト更新
        const ul = document.getElementById('players-ul');
        ul.innerHTML = '';
        appState.players.forEach((p, index) => {
            const li = document.createElement('li');
            li.className = 'player-item';
            
            let icon = '';
            if (p.role === 'admin') icon = '<span class="role-icon icon-admin">✔</span>';
            if (p.role === 'verified') icon = '<span class="role-icon icon-verified">✔</span>';

            let verifyBtn = '';
            // 自分以外＆自分が管理者＆相手がゲストなら認証ボタン表示
            if (index !== 0 && appState.user.role === 'admin' && p.role === 'guest') {
                verifyBtn = `<button class="secondary" onclick="verifyUser(${index})" style="width:auto; padding:6px 10px; margin:0; font-size:0.8rem;">認証</button>`;
            }

            li.innerHTML = `<span>${p.name} ${icon}</span> ${verifyBtn}`;
            ul.appendChild(li);
        });
    }

    // ゲーム画面遷移
    document.getElementById('start-jinrou-btn').addEventListener('click', () => {
        document.getElementById('game-title').innerText = '🐺 人狼ゲーム';
        showScreen('game');
    });

    document.getElementById('start-ngword-btn').addEventListener('click', () => {
        document.getElementById('game-title').innerText = '💬 NGワードゲーム';
        showScreen('game');
    });

    document.getElementById('back-to-lobby-btn').addEventListener('click', () => showScreen('lobby'));

</script>
</body>
</html>
